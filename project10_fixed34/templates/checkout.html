<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Farm Fresh</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/products.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

{% include 'navbar.html' %}

<div class="page-hero">
    <h1>Checkout</h1>
    <p>Choose how you'd like to receive your order</p>
</div>

<section class="form-page">
    <div class="container">
        <div class="form-card">
            <h1>How would you like your order?</h1>
            <p>Select delivery to your door or collection from the farm.</p>

            <form action="{{ url_for('checkout') }}" method="POST">
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="order_type" value="delivery" required>
                        <i class="fa-solid fa-truck" style="color:var(--green-mid);font-size:1.3rem;"></i>
                        <div>
                            <div class="option-text">Home Delivery</div>
                            <div class="option-desc">We'll deliver straight to your door</div>
                        </div>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="order_type" value="collection" required>
                        <i class="fa-solid fa-store" style="color:var(--green-mid);font-size:1.3rem;"></i>
                        <div>
                            <div class="option-text">Farm Collection</div>
                            <div class="option-desc">Pick up from our farm — Mon–Sat, 9am–5pm</div>
                        </div>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                    Continue &nbsp;<i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
</section>

{% include 'footer.html' %}

</body>
</html>
