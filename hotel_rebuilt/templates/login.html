{% extends 'base.html' %}
{% block title %}Login — The Grand{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-visual" style="background-image: url('{{ url_for('static', filename='images/image1.webp') }}')">
        <div class="auth-visual-overlay"></div>
        <div class="auth-visual-text">
            <p class="section-eyebrow">Welcome Back</p>
            <h2>"Luxury is in each<br>detail."</h2>
            <p>— Hubert de Givenchy</p>
        </div>
    </div>
    <div class="auth-form-panel">
        <div class="auth-box">
            <a href="{{ url_for('home') }}" class="auth-logo">THE GRAND</a>
            <h2>Sign In</h2>
            <p>Access your reservations and exclusive member benefits.</p>

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-gold" style="width:100%;justify-content:center;">Sign In</button>
            </form>

            <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Create one here</a></p>
        </div>
    </div>
</section>
{% endblock %}
