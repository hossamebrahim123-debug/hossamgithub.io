{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}
{% block content %}
<style>
.form-card { background: var(--surface); border-radius: 14px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); max-width: 700px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.section-divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.grades-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>

<div class="main">
    <div class="page-header">
        <div class="page-title"><i class="fa-solid fa-user-plus"></i> Add New Student</div>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>

    <div class="form-card">
        <form action="{{ url_for('add_student') }}" method="POST">

            <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:18px;color:var(--text-mid);">STUDENT DETAILS</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="e.g. John Smith">
                </div>
                <div class="form-group">
                    <label>Year Group</label>
                    <select name="year_group" required>
                        <option value="7">Year 7</option>
                        <option value="8">Year 8</option>
                        <option value="9">Year 9</option>
                        <option value="10">Year 10</option>
                        <option value="11">Year 11</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Attendance %</label>
                    <input type="number" name="attendance" min="0" max="100" value="90" required>
                </div>
            </div>

            <hr class="section-divider">
            <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:18px;color:var(--text-mid);">GRADES & TEACHERS</h3>

            <div class="grades-grid">
                {% for subject in ['Maths', 'English', 'Science', 'History', 'Geography'] %}
                <div class="card" style="padding:16px;">
                    <div style="font-weight:600;font-size:0.88rem;margin-bottom:12px;">{{ subject }}</div>
                    <div class="form-group" style="margin-bottom:10px;">
                        <label>Grade (0-100)</label>
                        <input type="number" name="grade_{{ subject }}" min="0" max="100" value="60" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Teacher</label>
                        <input type="text" name="teacher_{{ subject }}" placeholder="e.g. Mr Smith">
                    </div>
                </div>
                {% endfor %}
            </div>

            <hr class="section-divider">
            <button type="submit" class="btn btn-success" style="width:100%;justify-content:center;padding:12px;">
                <i class="fa-solid fa-plus"></i> Add Student
            </button>
        </form>
    </div>
</div>
{% endblock %}
